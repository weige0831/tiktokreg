name: TikTok Batch Register

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/register.yml'
  workflow_dispatch:
    inputs:
      count:
        description: '注册数量'
        required: true
        default: '5'
        type: string
      concurrency:
        description: '并发数（建议 2-3）'
        required: true
        default: '2'
        type: string

concurrency:
  group: tiktok-register
  cancel-in-progress: false

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-1.40.0-chromium-v2

      - name: Install system dependencies for Chromium
        shell: bash
        run: |
          # Ubuntu 24.04 noble 兼容：libasound2 → libasound2t64
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libatspi2.0-0 \
            libcairo2 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libexpat1 \
            libgbm1 \
            libglib2.0-0 \
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 \
            libx11-6 libx11-xcb1 libxcb1 libxcomposite1 \
            libxdamage1 libxext6 libxfixes3 libxkbcommon0 \
            libxrandr2 xdg-utils || true

      - name: Install Playwright Chromium (no --with-deps)
        shell: bash
        run: |
          # 不用 --with-deps，因为上面手动安装了系统依赖
          python -m playwright install chromium

      - name: Verify Playwright works
        run: |
          cd backend
          python -c "
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              browser.close()
              print('✓ Playwright Chromium OK')
          "

      - name: Check required secrets
        id: secrets
        env:
          TEMPMAIL_BASE_URL: ${{ secrets.TEMPMAIL_BASE_URL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          if [ -z "$TEMPMAIL_BASE_URL" ]; then
            echo "mode=self_check" >> $GITHUB_OUTPUT
            echo "::warning::TEMPMAIL_BASE_URL 未配置，仅做代码自检"
          elif [ -z "$WEBHOOK_URL" ] || [ -z "$WEBHOOK_SECRET" ]; then
            echo "mode=no_webhook" >> $GITHUB_OUTPUT
            echo "::warning::WEBHOOK_URL 或 WEBHOOK_SECRET 未配置，注册会跑但不推送结果"
          else
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "完整模式：注册 + 推送"
          fi

      - name: Self check (no secrets configured)
        if: steps.secrets.outputs.mode == 'self_check'
        run: |
          echo "==> 仅做代码自检，不执行实际注册"
          cd backend && python -c "from core.config_loader import load_config; cfg = load_config('config.yaml'); print('OK config')"
          python -c "import cv2; print(f'OK opencv {cv2.__version__}')"
          python -c "import httpx; print(f'OK httpx {httpx.__version__}')"

      - name: Run registration
        if: steps.secrets.outputs.mode != 'self_check'
        working-directory: backend
        env:
          TEMPMAIL_BASE_URL: ${{ secrets.TEMPMAIL_BASE_URL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          LOG_LEVEL: INFO
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COUNT="${{ github.event.inputs.count }}"
            CONCURRENCY="${{ github.event.inputs.concurrency }}"
          else
            COUNT=2
            CONCURRENCY=1
          fi
          echo "==> 开始注册: count=$COUNT concurrency=$CONCURRENCY"
          python main.py --count "$COUNT" --concurrency "$CONCURRENCY"

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: registration-logs-${{ github.run_id }}
          path: backend/*.log
          if-no-files-found: ignore
          retention-days: 7
